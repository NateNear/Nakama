version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:14-alpine
    container_name: ttt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Nakama ──────────────────────────────────────────────────────────────────
  nakama:
    image: heroiclabs/nakama:3.21.1
    container_name: ttt-nakama
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./nakama/dist:/nakama/data/modules   # compiled JS goes here
      - nakama-data:/nakama/data
    ports:
      - "7349:7349"   # gRPC API
      - "7350:7350"   # HTTP API
      - "7351:7351"   # console
    environment:
      - NAKAMA_NAME=tictactoe-nakama
    command: >
      /bin/sh -c "
        /nakama/nakama migrate up
          --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
          --name tictactoe
          --database.address postgres:localdb@postgres:5432/nakama
          --logger.level INFO
          --session.token_expiry_sec 7200
          --socket.outgoing_queue_size 128
          --runtime.js_entrypoint index.js
      "
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── Frontend (dev) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ttt-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_NAKAMA_HOST=localhost
      - REACT_APP_NAKAMA_PORT=7350
      - REACT_APP_NAKAMA_SSL=false
      - REACT_APP_SERVER_KEY=defaultkey

volumes:
  postgres-data:
  nakama-data:
